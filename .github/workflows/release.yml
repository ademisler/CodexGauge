name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build release artifacts
        run: ./Scripts/build_release_artifacts.sh
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="CodexControl ${TAG#v}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TITLE" --generate-notes
          gh release upload "$TAG" \
            ReleaseArtifacts/CodexControl-macos.zip \
            ReleaseArtifacts/CodexControl-macos.zip.sha256 \
            --clobber
